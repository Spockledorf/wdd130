<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NW Trailblazers | Contact Us</title>
    <meta name="description"
      content="Get in touch with Northwest Trailblazers to book a trip, ask questions, or learn more about our guided whitewater rafting adventures." />
    <meta name="author" content="Michael Jarvis" />
    <link rel="stylesheet" href="styles/rafting.css" />
</head>

<body>
    <header>
        <img src="images/icon-nw-trailblazers.webp" alt="Icon Northwest Trailblazers">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="company-info">
            <!-- Title and Address info -->
            <h1 class="large-text">Northwest Trailblazers Rafting Co.</h1>
            <!-- <p class="large-text">Northwest Trailblazers Rafting Co.</p> -->
            <p>117 West Mill Street
                <br>Cascade, Idaho 83611
                <br>+1 183 723 4567
                <br>getAdventure@NWTrailblazers.com
            </p>
        </div>
        <section class="map-and-form">
            <div>
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d5690.311143265355!2d-116.03290280420758!3d44.51196675985328!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1775936402947!5m2!1sen!2sus"
                  width="600" height="400" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div>
                <!-- Form -->
                <form class="inquiry-form" action="">
                    <div class="form-group form-group-text">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Placeholder">
                    </div>
                    <div class="form-group form-group-text">
                        <label for="email">Email</label>
                        <input type="text" id="email" name="email" placeholder="Placeholder">
                    </div>
                    <div class="form-group">
                        <label for="purpose-general">Message <br>Purpose</label>
                        <div class="radio-buttons">
                            <label for="purpose-general">
                                <input type="radio" id="purpose-general" name="purpose"
                                  value="General-Inquiry">
                                General Inquiry
                            </label>
                            <label for="purpose-reservation">
                                <input type="radio" id="purpose-reservation" name="purpose"
                                  value="Reservation-Question">
                                Reservation Question
                            </label>
                            <label for="purpose-suggestion">
                                <input type="radio" id="purpose-suggestion" name="purpose"
                                  value="Website-Suggestion">
                                Website Suggestion
                            </label>
                        </div>
                    </div>
                    <div class="form-group form-group-vert">
                        <label for="message">Message</label>
                        <textarea name="message" id="message" placeholder="Type here"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="newsletter">
                            <input type="checkbox" id="newsletter" name="newsletter">
                            <span>Please subscribe me to the monthly newsletter!</span>
                        </label>
                    </div>
                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>
        <section>
            <h2>We Are Here to Serve You!</h2>
            <div class="figures">
                <!-- Employee - Title 
                Jordan Ramirez — Operations Manager
                Taylor Chen — Customer Experience Specialist
                Alex Morgan — Lead River Guide -->
                <figure>
                    <img src="https://dummyimage.com/300x300/333/fff/"
                      alt="Profile photo for Jordan Ramirez." />
                    <figcaption><a href="#">Jordan Ramirez<br>Operations Manager</a></figcaption>
                </figure>
                <figure>
                    <img src="https://dummyimage.com/300x300/333/fff/"
                      alt="Profile photo for Taylor Chen." />
                    <figcaption><a href="#">Taylor Chen<br>Customer Experience Specialist</a>
                    </figcaption>
                </figure>
                <figure>
                    <img src="https://dummyimage.com/300x300/333/fff/"
                      alt="Profile photo for Alex Morgan." />
                    <figcaption><a href="#">Alex Morgan<br>Lead River Guide</a></figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 | Northwest Trailblazers | Michael Jarvis</p>
        <nav class="socialmedia">
            <a href="https://youtube.com" target="_blank"><img src="images/youtube-square.png"
                  alt="Youtube logo"></a>
            <a href="https://www.linkedin.com/" target="_blank"><img
                  src="images/linkedin-square.webp" alt="Linkedin logo"></a>
            <a href="https://www.instagram.com/" target="_blank"><img
                  src="images/instagram-square.webp" alt="Instagram logo"></a>
        </nav>
    </footer>
</body>

</html>
