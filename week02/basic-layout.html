<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Michael Jarvis">
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="Basic logo of a computer monitor with code displayed"
          width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a
                  href="https://www.churchofjesuschrist.org/study/scriptures?lang=eng&platform=web">Online
                    Scriptures</a>
            </li>
            <li><a href="https://www.churchofjesuschrist.org/temples/photo-gallery?lang=eng">
                    Temples Photo Gallery</a></li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Rem, ipsa.</p>
        </section>
        <section>
            <h2>2nd Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dignissimos cum a impedit
                ducimus.
            </p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/belem-brazil/800x500/belem_brazil_temple_exterior2.jpg"
          width="200">
    </aside>
    <footer>
        <p>&copy; 2026 | Michael Jarvis</p>
    </footer>
</body>

</html>
